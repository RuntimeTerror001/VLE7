apiVersion: apps/v1
kind: Deployment
metadata:
  name: vle7-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vle7-app
  template:
    metadata:
      labels:
        app: vle7-app
    spec:
      containers:
      - name: vle7-app
        image: runtimeterror01/vle7-app:latest
        ports:
        - containerPort: 5000